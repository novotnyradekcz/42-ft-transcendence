server {
    listen 80;
    server_name transcendence.spaceorange.eu;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name transcendence.spaceorange.eu;

    ssl_certificate     /etc/letsencrypt/live/transcendence.spaceorange.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/transcendence.spaceorange.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://server:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
