services:
  # ── Rust / Actix-web server ───────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/transcendence
    volumes:
      # Bind-mount the source tree so the container can build & run it.
      # The compiled artefacts (target/) stay on the host for layer caching.
      - ./server:/app
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ── PostgreSQL 17 ─────────────────────────────────────────────────────────
  db:
    image: postgres:17.10-trixie
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transcendence
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transcendence"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
